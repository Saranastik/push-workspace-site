<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Пуши — рабочее место</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="gate" class="gate hidden">
    <div class="gate-box">
      <h1>Рабочее место</h1>
      <p>Вставьте GitHub-токен (fine-grained PAT с доступом к репозиторию данных).</p>
      <input id="gate-token" type="password" placeholder="github_pat_…" autocomplete="off">
      <button id="gate-save">Войти</button>
      <p id="gate-error" class="error hidden"></p>
    </div>
  </div>

  <div id="shell" class="hidden">
    <header>
      <span class="brand">Ozon Селект · Пуши</span>
      <nav id="tabs">
        <button data-tab="desk" class="active">Рабочий стол</button>
        <button data-tab="archive">Архив</button>
        <button data-tab="knowledge">База знаний</button>
        <button data-tab="plan">Промоплан</button>
        <button data-tab="analytics">Аналитика</button>
      </nav>
      <button id="logout" title="Сменить токен">⎋</button>
    </header>
    <main id="view"></main>
  </div>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/chart.umd.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
